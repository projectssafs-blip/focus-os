<!DOCTYPE html>
<html>
<head><title>Setup</title></head>
<body>
  <h2>Set Password</h2>
  <input type="password" id="pw" placeholder="Enter new password" />
  <button onclick="setPass()">Set Password</button>
  <p id="msg"></p>

  <script src="auth.js"></script>
  <script>
    async function setPass() {
      const p = document.getElementById('pw').value;
      try {
        await Auth.setPassword(p);
        document.getElementById('msg').textContent = '✓ Password set! You can close this page.';
      } catch(e) {
        document.getElementById('msg').textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
